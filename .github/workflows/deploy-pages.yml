name: Deploy Pages
on:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: true
jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Stage site (exclude repo internals)
        run: |
          mkdir -p /tmp/site
          rsync -a --exclude .git --exclude .github ./ /tmp/site/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: /tmp/site
      # GitHub's Pages deployment queue backed up past the action's 10-minute cap on
      # 2026-07-02 (deployment_queued -> "Timeout reached, aborting!"; the timeout
      # input is CLAMPED to 600000ms, so a longer wait needs sequential attempts).
      # Three chained tries = ~30 minutes of queue coverage per run.
      - id: deployment
        uses: actions/deploy-pages@v4
        continue-on-error: true
      - id: deployment2
        if: steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@v4
        continue-on-error: true
      - id: deployment3
        if: steps.deployment2.outcome == 'failure'
        uses: actions/deploy-pages@v4
