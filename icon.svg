<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" role="img" aria-label="Icenomics">
  <defs>
    <linearGradient id="ic-sweep" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#2dd4a7"/>
      <stop offset="50%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#7dd3fc"/>
    </linearGradient>
    <linearGradient id="ic-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#16233a"/>
      <stop offset="100%" stop-color="#0c131f"/>
    </linearGradient>
  </defs>
  <rect width="180" height="180" rx="40" fill="url(#ic-bg)"/>
  <!-- value gauge: faint full track + a bright sweep (the "value reading") -->
  <path d="M36 118 A54 54 0 0 1 144 118" fill="none" stroke="#243349" stroke-width="13" stroke-linecap="round"/>
  <path d="M36 118 A54 54 0 0 1 128 80" fill="none" stroke="url(#ic-sweep)" stroke-width="13" stroke-linecap="round"/>
  <!-- needle reading high value -->
  <line x1="90" y1="118" x2="120" y2="83" stroke="#eaf6ff" stroke-width="6" stroke-linecap="round"/>
  <!-- hockey puck hub (3/4 view: dark side, lit top face, rim) -->
  <ellipse cx="90" cy="121" rx="18" ry="12" fill="#070b12"/>
  <ellipse cx="90" cy="116" rx="18" ry="12" fill="#1c2942"/>
  <ellipse cx="90" cy="116" rx="18" ry="12" fill="none" stroke="#3a5478" stroke-width="2.5"/>
</svg>
